name: CI

on:
  push:
    branches: ["main", "develop", "feat/**", "fix/**", "docs/**", "ci/**", "test/**", "refactor/**", "chore/**", "build/**", "perf/**"]
  pull_request:
    branches: ["develop", "main"]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Enforce the branch naming convention on every PR. Branches must be
  # <type>/<name> with an allowed Conventional Commit type (see CONTRIBUTING.md).
  # develop/main are accepted as PR heads so the develop->main release-promotion
  # PR (head_ref == develop) is never blocked. This "Branch Name" check is a
  # required status check on develop/main, so a misnamed branch cannot merge. (A
  # server-side branch-name ruleset would also block at push/creation time, but
  # that rule type needs a GitHub organization plan — unavailable on a user repo.)
  branch-name:
    name: Branch Name
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate head branch name
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ "$HEAD_REF" == "develop" || "$HEAD_REF" == "main" ]]; then
            echo "Core branch '$HEAD_REF' — allowed (release promotion)."
            exit 0
          fi
          pattern='^(feat|fix|docs|ci|test|refactor|chore|build|perf)/[a-z0-9._-]+$'
          if [[ "$HEAD_REF" =~ $pattern ]]; then
            echo "Branch '$HEAD_REF' conforms to <type>/<name>."
          else
            echo "::error title=Invalid branch name::'$HEAD_REF' must be <type>/<name> where <type> is one of: feat, fix, docs, ci, test, refactor, chore, build, perf (for example feat/spaside-led-map). See CONTRIBUTING.md."
            exit 1
          fi

  # The configure/build/test matrix lives in the reusable _build.yml so CI and the
  # release pipeline share one definition and can never drift. Runner selection
  # (vars.RUNNER_LINUX / RUNNER_WINDOWS) is handled inside that workflow.
  # upload_installtree publishes the Linux install tree that e2e-ui consumes below
  # (so e2e no longer recompiles the app).
  build-and-test:
    name: Build & Test
    uses: ./.github/workflows/_build.yml
    with:
      upload_installtree: true

  # Drive the real UI against a replay fixture in a browser. Consumes the binary
  # built by build-and-test (the installtree-linux-gcc artifact) instead of
  # recompiling the app. Trade-off: gated behind the whole build matrix, so it
  # starts later than when it built its own binary — but it never recompiles.
  e2e-ui:
    name: E2E UI (Playwright)
    needs: build-and-test
    # Fork PRs must not run on the persistent self-hosted runners (untrusted code
    # on a long-lived host). Same-repo PRs and push/release events are unaffected.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-latest"]') }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Download Linux install tree
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: installtree-linux-gcc
          path: installtree-art

      - name: Unpack install tree
        shell: bash
        run: |
          mkdir -p installtree
          tar xzf installtree-art/installtree-linux-gcc.tar.gz -C installtree
          chmod +x installtree/bin/aqualink-automate

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Playwright + Chromium
        shell: bash
        run: |
          npm ci
          # `--with-deps` runs Playwright's apt helper, which errors on the
          # self-hosted runner's Ubuntu 26.04 ("does not support chromium on
          # ubuntu26.04-x64"). That runner already carries the browser system
          # libs from prior runs, so fetching just the browser binary is enough;
          # fall back to it when the deps path is unsupported (keeps a stock
          # GitHub-hosted ubuntu-latest runner working too).
          npx playwright install --with-deps chromium || npx playwright install chromium

      # The four runs mirror the modes encoded in playwright.config.ts. Each boots
      # the downloaded binary against the replay fixture; env selects the mode.
      #   * default        -> every spec except auth (history/scheduler "disabled" paths)
      #   * AUTH_TOKEN      -> only auth.spec.ts      (token-gated WS auth)
      #   * HISTORY_DB      -> only trends.spec.ts    (recorded series + chart)
      #   * SCHEDULES_FILE  -> only schedules.spec.ts (schedule CRUD)
      - name: E2E — default (unauthenticated)
        shell: bash
        run: npx playwright test
        env:
          AQUALINK_EXE: ${{ github.workspace }}/installtree/bin/aqualink-automate

      - name: E2E — auth enabled
        shell: bash
        run: npx playwright test
        env:
          AQUALINK_EXE: ${{ github.workspace }}/installtree/bin/aqualink-automate
          AQUALINK_AUTH_TOKEN: e2e-secret-token

      - name: E2E — history enabled
        shell: bash
        run: npx playwright test
        env:
          AQUALINK_EXE: ${{ github.workspace }}/installtree/bin/aqualink-automate
          AQUALINK_HISTORY_DB: ${{ runner.temp }}/e2e-history.db

      - name: E2E — scheduler enabled
        shell: bash
        run: npx playwright test
        env:
          AQUALINK_EXE: ${{ github.workspace }}/installtree/bin/aqualink-automate
          AQUALINK_SCHEDULES_FILE: ${{ runner.temp }}/e2e-schedules.json

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  matter-bridge:
    name: Matter Bridge (Node)
    # Fork PRs must not run on the persistent self-hosted runners (untrusted code
    # on a long-lived host). Same-repo PRs and push events are unaffected.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-latest"]') }}
    defaults:
      run:
        working-directory: matter-bridge

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: matter-bridge/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck (incl. matter.js bridge)
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  version-check:
    name: Version Check
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check version bump
        shell: bash
        run: |
          # The project version is derived from git tags (see GitVersionDerivation.cmake),
          # not from a literal in CMakeLists.txt, so compare what `git describe` resolves on
          # the PR head versus the base branch.
          HEAD_DESCRIBE=$(git describe --tags --match "v*" --always HEAD 2>/dev/null || echo "none")
          BASE_DESCRIBE=$(git describe --tags --match "v*" --always "origin/${{ github.base_ref }}" 2>/dev/null || echo "none")

          echo "Base (${{ github.base_ref }}): $BASE_DESCRIBE"
          echo "Head: $HEAD_DESCRIBE"

          # A PR into main is a release promotion. Block (don't just warn) when the
          # resolved version is identical to the base — i.e. there is nothing new to
          # release. Distinct `git describe` output (a different commit distance or a
          # new tag) is enough to pass; this only fails a genuinely empty promotion.
          if [[ "$HEAD_DESCRIBE" == "$BASE_DESCRIBE" ]]; then
            echo "::error::Version is unchanged between ${{ github.base_ref }} ($BASE_DESCRIBE) and this PR head ($HEAD_DESCRIBE). Nothing new to release."
            exit 1
          fi
          echo "Version advances: base=$BASE_DESCRIBE -> head=$HEAD_DESCRIBE"

  # Cold, from-source Docker build kept deliberately as the gate that the
  # multi-stage Dockerfile + vcpkg toolchain still build end to end (the assembled
  # runtime path in release.yml's docker-publish skips this, so this is its safety
  # net). Catches a vcpkg/Dockerfile/ABI regression that the assembly path can't.
  docker-verify:
    name: Docker Verification
    # Fork PRs must not run on the persistent self-hosted runners (untrusted code
    # on a long-lived host). Same-repo PRs and push events are unaffected.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-latest"]') }}
    # Surfaced so the "Login to Docker Hub" step's `if:` can gate on the optional
    # secret being present. See release.yml / docs/releasing.md.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      # Authenticate to Docker Hub when credentials are configured so base-image
      # pulls (ubuntu:25.04, node:22-bookworm-slim) use the higher authenticated
      # rate limit instead of the anonymous per-IP quota. Gated so fork PRs (which
      # receive no secrets) still build anonymously.
      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Both builds are wrapped in a bounded retry so a transient Docker Hub CDN
      # blob timeout pulling a base image doesn't fail CI. A retry reuses the
      # BuildKit layer cache + the in-Dockerfile ccache/vcpkg cache mounts, so it
      # only re-fetches the layer that timed out. docker/setup-buildx-action makes
      # its builder the default, so `docker buildx build` here is equivalent to the
      # docker/build-push-action invocations it replaces.
      - name: Build CI target
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          shell: bash
          timeout_minutes: 90
          max_attempts: 3
          retry_wait_seconds: 30
          retry_on: error
          command: docker buildx build --target ci .

      - name: Build runtime target
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          shell: bash
          timeout_minutes: 90
          max_attempts: 3
          retry_wait_seconds: 30
          retry_on: error
          command: docker buildx build --target runtime --load --tag aqualink-automate:verify .

      # The runtime image now bundles the Matter sidecar (built by the matter-builder
      # stage). The --version smoke test exercises the app via the supervising
      # entrypoint; MATTER_ENABLED=false keeps it focused on the C++ binary.
      - name: Verify runtime starts (app)
        run: docker run --rm -e MATTER_ENABLED=false aqualink-automate:verify --version

      # Confirm the bundled sidecar is present and its Node runtime works (without
      # actually booting the bridge, which would block).
      - name: Verify Matter sidecar is bundled
        run: docker run --rm --entrypoint sh aqualink-automate:verify -c "node --version && test -f /opt/matter-bridge/dist/index.js && echo sidecar-present"
