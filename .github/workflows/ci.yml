name: CI

on:
  push:
    branches: ["develop", "main", "feature/**", "bug/**"]
  pull_request:
    branches: ["develop", "main"]

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Linux GCC"
            os: ubuntu-latest
            compiler: gcc-13
            configure_preset: config-linux-gcc
            build_preset: build-linux-gcc
            test_preset: test-linux-gcc
          - name: "Windows MSVC"
            os: windows-latest
            compiler: msvc
            configure_preset: config-windows-msvc
            build_preset: build-windows-msvc
            test_preset: test-windows-msvc
          - name: "macOS Clang"
            os: macos-latest
            compiler: llvm
            configure_preset: config-macos-llvm
            build_preset: build-macos-llvm
            test_preset: test-macos-llvm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup C++ toolchain (Linux)
        if: runner.os == 'Linux'
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          cmake: true
          ninja: true

      - name: Setup build tools (Windows)
        if: runner.os == 'Windows'
        uses: aminya/setup-cpp@v1
        with:
          cmake: true
          ninja: true

      - name: Install MacPorts (macOS)
        if: runner.os == 'macOS'
        run: |
          # Detect macOS version for correct MacPorts package
          MACOS_VERSION=$(sw_vers -productVersion | cut -d. -f1)
          case "$MACOS_VERSION" in
            15) MP_VERSION="15-Sequoia" ;;
            14) MP_VERSION="14-Sonoma" ;;
            13) MP_VERSION="13-Ventura" ;;
            *)  MP_VERSION="15-Sequoia" ;;
          esac
          MP_PKG="MacPorts-2.10.5-${MP_VERSION}.pkg"
          curl -fsSLO "https://github.com/macports/macports-base/releases/download/v2.10.5/${MP_PKG}"
          sudo installer -pkg "${MP_PKG}" -target /
          export PATH="/opt/local/bin:$PATH"
          sudo port -N install clang-21

      - name: Configure macOS paths
        if: runner.os == 'macOS'
        run: echo "/opt/local/libexec/llvm-21/bin" >> "$GITHUB_PATH"

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: brew install cmake ninja autoconf automake libtool

      - uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ github.workspace }}/deps/vcpkg"

      - name: Configure
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.configure_preset }}

      - name: Build
        uses: lukka/run-cmake@v10
        with:
          buildPreset: ${{ matrix.build_preset }}

      - name: Test
        uses: lukka/run-cmake@v10
        with:
          testPreset: ${{ matrix.test_preset }}

  docker-verify:
    name: Docker Verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Build CI target
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build runtime target
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          load: true
          tags: aqualink-automate:verify
          cache-from: type=gha

      - name: Verify runtime starts
        run: docker run --rm aqualink-automate:verify --version
