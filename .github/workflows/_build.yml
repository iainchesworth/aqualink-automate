# Reusable build/test(/package) workflow — the single definition of how the C++
# project is configured, built, tested and (optionally) packaged on each platform.
# Called by ci.yml (build-and-test) and release.yml (build-packages) so the two
# can never drift. Behaviour is identical to the two matrix jobs it replaces; the
# only parameters are whether to also package (release) and the checkout depth.
name: Reusable Build

on:
  workflow_call:
    inputs:
      do_package:
        description: "Also run cpack + the install/extract smoke test + upload packages (release path)."
        type: boolean
        default: false
      version_tag:
        description: "Resolved v* tag, threaded into configure as DERIVED_VERSION_OVERRIDE so the build stamps it deterministically. Empty in CI -> `git describe`."
        type: string
        default: ""
      fetch_depth:
        description: "checkout fetch-depth (0 for releases so `git describe`/cut-from-main see full history + tags; 1 for CI)."
        type: number
        default: 1
      upload_installtree:
        description: "On Linux, run `cmake --install` and upload installtree-linux-gcc (the relocatable FHS tree e2e-ui and the assembled Docker image consume instead of recompiling)."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    # Fork PRs must not run on the persistent self-hosted runners selected via
    # vars.RUNNER_* (untrusted code on a long-lived host). This reusable workflow is
    # also called from release.yml on push/dispatch (never pull_request), so that
    # path is unaffected; same-repo PRs from ci.yml continue to run normally.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ fromJSON(matrix.runner) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Linux GCC"
            runner: ${{ vars.RUNNER_LINUX || '["ubuntu-latest"]' }}
            compiler: gcc-15
            configure_preset: config-linux-gcc
            build_preset: build-linux-gcc
            test_preset: test-linux-gcc
            package_preset: pack-linux-gcc
            # Release packages build in this glibc-2.36 container (Debian Bookworm /
            # Raspberry Pi OS baseline) so they run on a stock Pi; CI builds on the host.
            docker_platform: linux/amd64
            # Install-tree artifact name (consumed by e2e-ui + the multi-arch Docker
            # image). The x64 name is unsuffixed for back-compat with the e2e-ui job.
            installtree_name: installtree-linux-gcc
          # Native arm64 build so the .deb/.rpm/.tgz install on a Raspberry Pi and
          # other aarch64 hosts. ubuntu-24.04-arm is a GitHub-hosted arm64 runner
          # (free for public repos); override RUNNER_LINUX_ARM to use a self-hosted
          # arm runner. The triplet/toolchain target aarch64, so no cross-compile.
          - name: "Linux GCC (arm64)"
            runner: ${{ vars.RUNNER_LINUX_ARM || '["ubuntu-24.04-arm"]' }}
            compiler: gcc-15
            configure_preset: config-linux-gcc-arm64
            build_preset: build-linux-gcc-arm64
            test_preset: test-linux-gcc-arm64
            package_preset: pack-linux-gcc-arm64
            docker_platform: linux/arm64
            installtree_name: installtree-linux-gcc-arm64
          - name: "Windows MSVC"
            runner: ${{ vars.RUNNER_WINDOWS || '["windows-latest"]' }}
            compiler: msvc
            configure_preset: config-windows-msvc
            build_preset: build-windows-msvc
            test_preset: test-windows-msvc
            package_preset: pack-windows-msvc
          - name: "macOS Clang"
            runner: '["macos-latest"]'
            compiler: llvm
            configure_preset: config-macos-llvm
            build_preset: build-macos-llvm
            test_preset: test-macos-llvm
            package_preset: pack-macos-llvm

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          fetch-depth: ${{ inputs.fetch_depth }}

      - name: Clean workspace (self-hosted)
        if: contains(matrix.runner, 'self-hosted')
        shell: bash
        run: rm -rf build/

      - uses: ./.github/actions/setup-cpp-toolchain
        if: ${{ !contains(matrix.runner, 'self-hosted') }}
        with:
          compiler: ${{ matrix.compiler }}

      # Self-hosted Windows images bake in the VS Build Tools but do not expose the
      # MSVC environment (cl.exe, INCLUDE/LIB) on the default PATH; load it so the
      # Configure step can find the compiler. Pure-PowerShell local composite (no
      # Node) — replaces ilammy/msvc-dev-cmd, which only ships a deprecated Node 20
      # runtime. (vcvars also leaks VCPKG_ROOT -> the VS-bundled vcpkg, same as the
      # old action; the Configure/Build/Test steps override it per-step.)
      - name: Setup MSVC environment (self-hosted)
        if: contains(matrix.runner, 'self-hosted') && runner.os == 'Windows'
        uses: ./.github/actions/setup-msvc-env

      - name: Install NSIS (Windows packaging)
        if: inputs.do_package && runner.os == 'Windows' && !contains(matrix.runner, 'self-hosted')
        run: choco install nsis -y

      - name: Setup vcpkg cache (self-hosted)
        if: contains(matrix.runner, 'self-hosted')
        shell: bash
        run: |
          BINARY_DIR="$HOME/.cache/vcpkg/archives"
          DOWNLOADS_DIR="$HOME/.cache/vcpkg/downloads"
          mkdir -p "$BINARY_DIR" "$DOWNLOADS_DIR"
          # Convert Git bash paths to native Windows paths for CMake/vcpkg
          # (vcpkg rejects an MSYS-style VCPKG_DEFAULT_BINARY_CACHE like /c/...).
          if command -v cygpath >/dev/null 2>&1; then
            BINARY_DIR=$(cygpath -w "$BINARY_DIR")
            DOWNLOADS_DIR=$(cygpath -w "$DOWNLOADS_DIR")
          fi
          echo "VCPKG_DEFAULT_BINARY_CACHE=$BINARY_DIR" >> "$GITHUB_ENV"
          echo "VCPKG_DOWNLOADS=$DOWNLOADS_DIR" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-vcpkg-cache
        if: ${{ !contains(matrix.runner, 'self-hosted') }}
        with:
          cache-key-prefix: ${{ matrix.name }}

      # Host build path (CI on every platform + the Windows/macOS release builds).
      # The Linux RELEASE build runs in a glibc-2.36 container instead (see the
      # "Build, test & package (glibc-2.36 container)" step below), so these host
      # steps skip for it.
      - name: Bootstrap vcpkg
        if: ${{ !(inputs.do_package && runner.os == 'Linux') }}
        shell: bash
        run: |
          if [ -f "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.sh" ]; then
            bash "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          elif [ -f "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.bat" ]; then
            "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          fi
        env:
          VCPKG_BINARY_SOURCES: "clear;default,readwrite"

      # At the 2026.06.01 vcpkg baseline the libbacktrace port (a boost-stacktrace
      # dependency) regenerates its configure via autoreconf, so the build host now
      # needs autoconf / autoconf-archive / automake / libtool. The self-hosted Linux
      # image bakes these in (cicd/packer/scripts/linux/06-dev-tools.sh), but install
      # them here too so the build also works on a not-yet-rebuilt image and on the
      # GitHub-hosted macOS runner. Windows builds libbacktrace without this path.
      - name: Install autotools for libbacktrace (Linux/macOS)
        if: ${{ runner.os != 'Windows' && !(inputs.do_package && runner.os == 'Linux') }}
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq autoconf autoconf-archive automake libtool
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install autoconf autoconf-archive automake libtool
          fi

      # VCPKG_ROOT points lukka/run-cmake (and the in-tree vcpkg toolchain) at the
      # project's deps/vcpkg. On self-hosted Windows, vcvarsall (msvc-dev-cmd) leaks
      # VCPKG_ROOT -> the VS-bundled, manifest-less vcpkg; this step-level env value
      # overrides that leak, so no special "pin" step is needed (same as Linux/macOS).
      # Stamp the resolved version deterministically: release callers pass the tag
      # via version_tag, which GitVersionDerivation honours OVER `git describe`
      # (eliminating the configure-time tag-race and the need to pre-create a local
      # tag). CI passes no tag, so use an explicit 0.0.0-dev rather than an empty
      # override: that stops the configure falling through to `git describe`, which
      # on the shallow CI checkout (no tags in history) can't resolve a v* tag and
      # emits a noisy "could not parse a v<...> tag" warning. 0.0.0-dev is exactly
      # the value that fallback would produce — just without the warning.
      - name: Configure
        if: ${{ !(inputs.do_package && runner.os == 'Linux') }}
        uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        with:
          configurePreset: ${{ matrix.configure_preset }}
          # --clean-{buildtrees,packages}-after-build stops vcpkg's transient
          # build dirs from piling up on the self-hosted runners' bounded ~20 GB
          # work disk during a from-scratch dependency build (cache miss).
          # Harmless on GitHub-hosted runners (buildtrees are never cached) and it
          # leaves the persistent downloads + binary-archive caches intact.
          configurePresetAdditionalArgs: "['-DDERIVED_VERSION_OVERRIDE=${{ inputs.version_tag || '0.0.0-dev' }}', '-DVCPKG_INSTALL_OPTIONS=--clean-buildtrees-after-build;--clean-packages-after-build']"
        env:
          VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

      - name: Build
        if: ${{ !(inputs.do_package && runner.os == 'Linux') }}
        uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        with:
          buildPreset: ${{ matrix.build_preset }}
        env:
          VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

      - name: Show build errors on failure
        if: ${{ failure() && !(inputs.do_package && runner.os == 'Linux') }}
        shell: bash
        run: |
          echo "::group::CMake build retry (verbose)"
          cmake --build --preset ${{ matrix.build_preset }} -- -k 1 2>&1 | tail -200 || true
          echo "::endgroup::"

      - name: Test
        if: ${{ !(inputs.do_package && runner.os == 'Linux') }}
        uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
        with:
          testPreset: ${{ matrix.test_preset }}
        env:
          VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

      # Persist the glibc-2.36 container's vcpkg binary cache. On self-hosted runners
      # $HOME/.cache survives across runs already; this restores it for the
      # GitHub-hosted arm64 runner. Keyed separately from the host (Ubuntu-25.04)
      # cache so the two glibc baselines never share archives.
      - name: Cache vcpkg (glibc-2.36 container)
        if: ${{ inputs.do_package && runner.os == 'Linux' && !contains(matrix.runner, 'self-hosted') }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/vcpkg-bookworm
          key: vcpkg-bookworm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('vcpkg.json', 'cmake/vcpkg/triplets/**') }}
          restore-keys: |
            vcpkg-bookworm-${{ runner.os }}-${{ runner.arch }}-

      # ---------------------------------------------------------------------------
      # Linux RELEASE build — inside a glibc-2.36 container (Debian Bookworm /
      # Raspberry Pi OS baseline) so the .deb/.rpm/.tgz run on a stock Pi and every
      # newer distro. Native per-arch (linux/amd64 on the x64 runner, linux/arm64 on
      # the arm runner — no QEMU). The job stays on the host, so the deb smoke test
      # below still has Docker. The bundled gcc-15 libstdc++/libgcc (see
      # cmake/CPackConfig.cmake) make the older-glibc base safe for the C++23 code.
      # ---------------------------------------------------------------------------
      - name: Build, test & package (glibc-2.36 container)
        if: ${{ inputs.do_package && runner.os == 'Linux' }}
        shell: bash
        env:
          VERSION_OVERRIDE: ${{ inputs.version_tag || '0.0.0-dev' }}
          CONFIGURE_PRESET: ${{ matrix.configure_preset }}
          BUILD_PRESET: ${{ matrix.build_preset }}
          TEST_PRESET: ${{ matrix.test_preset }}
          PACKAGE_PRESET: ${{ matrix.package_preset }}
          # Both Linux legs produce a per-arch install tree the multi-arch Docker
          # image consumes (and e2e-ui consumes the x64 one).
          PACK_INSTALLTREE: ${{ inputs.upload_installtree }}
          INSTALLTREE_NAME: ${{ matrix.installtree_name }}
        run: |
          mkdir -p "$HOME/.cache/vcpkg-bookworm"
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -v "${{ github.workspace }}":/work -w /work \
            -v "$HOME/.cache/vcpkg-bookworm":/vcpkgcache \
            -e VERSION_OVERRIDE -e CONFIGURE_PRESET -e BUILD_PRESET -e TEST_PRESET \
            -e PACKAGE_PRESET -e PACK_INSTALLTREE -e INSTALLTREE_NAME \
            gcc:15-bookworm bash -eu -c '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq --no-install-recommends \
                ninja-build git ca-certificates curl zip unzip tar make \
                autoconf autoconf-archive automake libtool pkg-config python3 \
                binutils file rpm fakeroot >/dev/null
              ARCH=$(uname -m)
              curl -fsSL "https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-linux-${ARCH}.tar.gz" | tar xz -C /opt
              export PATH="/opt/cmake-3.31.6-linux-${ARCH}/bin:$PATH"
              # Restore exec bits on the maintainer scripts (lost on a Windows checkout).
              chmod +x packaging/deb/postinst packaging/deb/prerm packaging/deb/postrm packaging/rpm/*.sh packaging/tarball/*.sh
              git config --global --add safe.directory /work
              git config --global --add safe.directory /work/deps/vcpkg
              export VCPKG_DEFAULT_BINARY_CACHE=/vcpkgcache
              ./deps/vcpkg/bootstrap-vcpkg.sh -disableMetrics >/dev/null
              cmake --preset "$CONFIGURE_PRESET" -DDERIVED_VERSION_OVERRIDE="$VERSION_OVERRIDE"
              cmake --build --preset "$BUILD_PRESET"
              ctest --preset "$TEST_PRESET"
              if [ "$PACK_INSTALLTREE" = "true" ]; then
                cmake --install "build/$CONFIGURE_PRESET" --prefix "install/$CONFIGURE_PRESET"
                tar czf "${INSTALLTREE_NAME}.tar.gz" -C "install/$CONFIGURE_PRESET" .
              fi
              cpack --preset "$PACKAGE_PRESET"
            '

      # ---------------------------------------------------------------------------
      # Linux install tree (consumed by e2e-ui and the assembled Docker image so
      # they do not recompile). This is the same `cmake --install` tree the
      # Dockerfile assembles the runtime image from: the binary + bundled vcpkg libs
      # ($ORIGIN RPATH) + web/ssl assets. Linux only (the consumers are Linux), and
      # built on the Ubuntu-25.04 runner so the binary's glibc/libstdc++ baseline
      # matches the ubuntu:25.04 Docker runtime base.
      # ---------------------------------------------------------------------------
      # x64 only: the install tree feeds the (x64) Docker image + e2e-ui, and the
      # artifact name is fixed, so the arm64 Linux entry must NOT also upload it.
      # CI builds the tree here on the host; the RELEASE tree is produced inside the
      # glibc-2.36 container step above (so the Docker image runs on a stock Pi too).
      - name: Install + pack the Linux install tree
        if: inputs.upload_installtree && matrix.configure_preset == 'config-linux-gcc' && !inputs.do_package
        shell: bash
        run: |
          cmake --install build/config-linux-gcc --prefix "${{ github.workspace }}/install/config-linux-gcc"
          # Pack as a tarball so the versioned .so SYMLINKS and exec bits survive the
          # CI artifact round-trip losslessly (a raw upload-artifact mangles symlinks,
          # and the runtime binary loads libs by their versioned SONAME).
          tar czf "${{ github.workspace }}/installtree-linux-gcc.tar.gz" \
            -C "${{ github.workspace }}/install/config-linux-gcc" .

      # CI uploads only the x64 tree (for e2e-ui); a release uploads both Linux legs'
      # trees (x64 + arm64) for the multi-arch Docker image. Per-arch artifact name.
      - name: Upload Linux install tree
        if: inputs.upload_installtree && runner.os == 'Linux' && (inputs.do_package || matrix.configure_preset == 'config-linux-gcc')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.installtree_name }}
          if-no-files-found: error
          path: ${{ matrix.installtree_name }}.tar.gz
          retention-days: 3

      # ---------------------------------------------------------------------------
      # Packaging (release path only — inputs.do_package)
      # ---------------------------------------------------------------------------
      # Windows/macOS package on the host; Linux packages are built by the
      # glibc-2.36 container step above (cpack runs inside it).
      - name: Package
        if: inputs.do_package && runner.os != 'Linux'
        run: cpack --preset=${{ matrix.package_preset }}

      # Install the freshly built .deb on a CLEAN debian:bookworm (the Raspberry Pi
      # OS baseline: glibc 2.36, gcc-12 system libstdc++) and run it. This is the
      # guard that the packages still run on a stock Pi — it catches both a missing
      # runtime dependency AND a regression to a too-new glibc/libstdc++ baseline
      # (which an ubuntu:25.04 test would silently pass). Runs natively per arch.
      - name: Smoke test — install package & run (Linux)
        if: inputs.do_package && runner.os == 'Linux'
        run: |
          docker run --rm --platform ${{ matrix.docker_platform }} \
            -v "$PWD/packages:/pkg:ro" debian:bookworm bash -c '
            set -e
            apt-get update -qq
            apt-get install -y -qq /pkg/*.deb
            aqualink-automate --version
            test -f /etc/aqualink-automate/aqualink-automate.conf
            getent passwd aqualink >/dev/null'

      - name: Smoke test — extract ZIP & run (Windows)
        if: inputs.do_package && runner.os == 'Windows'
        # Windows PowerShell (always present on self-hosted + GitHub-hosted), NOT
        # pwsh/PowerShell 7 which the self-hosted runner image does not ship.
        shell: powershell
        run: |
          $zip = Get-ChildItem packages/*.zip | Select-Object -First 1
          if (-not $zip) { throw "No ZIP package was produced" }
          Expand-Archive -Path $zip.FullName -DestinationPath smoke -Force
          $exe = Get-ChildItem -Path smoke -Recurse -Filter aqualink-automate.exe | Select-Object -First 1
          if (-not $exe) { throw "aqualink-automate.exe not found in the package" }
          & $exe.FullName --version
          if ($LASTEXITCODE -ne 0) { throw "Binary exited with code $LASTEXITCODE" }

      - name: Smoke test — extract TGZ & run (macOS)
        if: inputs.do_package && runner.os == 'macOS'
        run: |
          set -e
          mkdir -p smoke
          tar xzf packages/*.tar.gz -C smoke
          BIN="$(find smoke -name aqualink-automate -type f -perm +111 | head -1)"
          if [ -z "$BIN" ]; then echo "::error::binary not found in package"; exit 1; fi
          "$BIN" --version

      - name: Upload packages
        if: inputs.do_package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-${{ matrix.configure_preset }}
          if-no-files-found: error
          path: |
            packages/*.deb
            packages/*.rpm
            packages/*.tar.gz
            packages/*.zip
            packages/*.exe
            packages/*.dmg
            packages/*.sha512
          retention-days: 30
