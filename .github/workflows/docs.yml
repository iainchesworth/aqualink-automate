# Build the documentation site (MkDocs Material) from the in-repo Markdown and
# publish it to the ROOT of the `gh-pages` branch — the docs home IS the Pages
# landing page (no /docs/ segment).
#
# This coexists with publish-repos.yml via `keep_files: true`: that workflow owns
# the signed APT/DNF package machinery (apt/, rpm/, key.gpg, install-apt.sh,
# install-dnf.sh); this one owns the rendered site (index.html, 404.html,
# assets/, search/, and a directory per page). The filenames are disjoint, so
# neither deletes the other's, and the package-install URLs are never touched.
# (publish-repos no longer writes index.html — the docs home owns it now.)
#
# In-repo Markdown is the single source of truth; mkdocs.yml selects the curated
# subset that is published (see its `nav` + `exclude_docs`).
name: Publish docs site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Serialise docs publishes so two runs can't race the gh-pages push. A separate
# group from publish-repos means a docs build and a package publish can still run
# at the same time (they touch different subtrees); on the rare simultaneous push
# the loser is retried by re-running the workflow.
concurrency:
  group: publish-docs
  cancel-in-progress: false

permissions:
  contents: write # push to gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.x"

      - name: Install MkDocs Material
        # Floor only (>=9.7) so the GitHub-compatible slugify and theme features
        # this site relies on are present; no upper cap, so future majors
        # (incl. the MkDocs 2.0 line) are adopted as they ship.
        run: pip install --disable-pip-version-check "mkdocs-material>=9.7"

      # --strict turns broken internal links and other warnings into errors, so a
      # bad cross-link fails the build instead of shipping a broken page.
      - name: Build site
        run: mkdocs build --strict

      - name: Publish to GitHub Pages (root)
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          keep_files: true # preserve apt/, rpm/, key.gpg, install-*.sh
          commit_message: "docs: publish site for ${{ github.sha }}"
