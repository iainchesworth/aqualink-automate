name: Automated Code Scanning

on:
  push:
    branches: [ "develop", "main", "feature/**", "bug/**" ]
  pull_request:
    branches: [ "develop", "main" ]
  schedule:
    - cron: '42 21 * * 2'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:

  ##
  ## CODEQL JOB
  ##

  CodeScanning_CodeQL:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        language: [ 'c-cpp' ]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    - uses: aminya/setup-cpp@v1
      with:
        compiler: gcc-13
        cmake: true
        ninja: true

    - uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: '${{ github.workspace }}/deps/vcpkg'

    - name: Configure
      uses: lukka/run-cmake@v10
      with:
        configurePreset: config-linux-gcc

    - name: Build
      uses: lukka/run-cmake@v10
      with:
        buildPreset: build-linux-gcc

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        upload: false

    - name: filter-sarif
      uses: advanced-security/filter-sarif@v1
      with:
        patterns: |
          -**/*
          src/**/*
        input: '../results/cpp.sarif'
        output: '../results/cpp.sarif'

    - name: Upload SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        category: "/language:${{ matrix.language }}"

    - name: Upload Analysis as a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sarif-results
        path: sarif-results
        retention-days: 1

  ##
  ## SONARCLOUD JOB
  ##

  CodeScanning_SonarCloud:
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Install build-wrapper
      uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v4

    - uses: aminya/setup-cpp@v1
      with:
        compiler: gcc-13
        cmake: true
        ninja: true
        gcovr: true
        python: true

    - uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: '${{ github.workspace }}/deps/vcpkg'

    - name: Configure
      uses: lukka/run-cmake@v10
      with:
        configurePreset: config-linux-gcc-coverage
        configurePresetAdditionalArgs: "['-DUSE_SONARQUBE=ON']"

    - name: Build with build-wrapper
      run: |
        build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} cmake --build --preset=build-linux-gcc-coverage

    - name: Run SonarCloud scan
      uses: SonarSource/sonarqube-scan-action@v4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dproject.settings=${{ github.workspace }}/sonar-project.properties
          -Dsonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
          -Dsonar.coverageReportPaths=${{ github.workspace }}/build/config-linux-gcc-coverage/coverage-testaqualink-automate.xml

  ##
  ## MSVC CODE ANALYSIS JOB
  ##

  CodeScanning_MSVCCodeAnalysis:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - uses: aminya/setup-cpp@v1
      with:
        compiler: msvc
        cmake: true
        ninja: true

    - uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: '${{ github.workspace }}/deps/vcpkg'

    - name: Configure
      uses: lukka/run-cmake@v10
      with:
        configurePreset: config-windows-msvc

    - name: Build
      uses: lukka/run-cmake@v10
      with:
        buildPreset: build-windows-msvc

    - uses: microsoft/msvc-code-analysis-action@v0.1.1
      id: run-analysis
      with:
        cmakeBuildDirectory: ${{ github.workspace }}/build/config-windows-msvc
        buildConfiguration: Release
        ruleset: NativeRecommendedRules.ruleset
        ignoredPaths: ${{ github.workspace }}/deps;${{ github.workspace }}/src/version;${{ github.workspace }}/test

    - name: Upload SARIF to GitHub
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.run-analysis.outputs.sarif }}

    - name: Upload SARIF as an Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sarif-file
        path: ${{ steps.run-analysis.outputs.sarif }}
