name: Automated Code Scanning

on:
  push:
    branches: [ "main", "feature/**", "bug/**" ]
  pull_request:
    branches: [ "develop", "main" ]
  schedule:
    - cron: '42 21 * * 2'

concurrency:
  group: code-scanning-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:

  ##
  ## CODEQL JOB
  ##

  CodeScanning_CodeQL:
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-latest"]') }}
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'c-cpp' ]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Clean workspace (self-hosted)
      if: contains(vars.RUNNER_LINUX || '', 'self-hosted')
      run: rm -rf build/

    - uses: ./.github/actions/setup-cpp-toolchain
      if: ${{ !contains(vars.RUNNER_LINUX || '', 'self-hosted') }}
      with:
        compiler: gcc-15

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    - name: Setup vcpkg cache (self-hosted)
      if: contains(vars.RUNNER_LINUX || '', 'self-hosted')
      run: |
        BINARY_DIR="$HOME/.cache/vcpkg/archives"
        DOWNLOADS_DIR="$HOME/.cache/vcpkg/downloads"
        mkdir -p "$BINARY_DIR" "$DOWNLOADS_DIR"
        echo "VCPKG_DEFAULT_BINARY_CACHE=$BINARY_DIR" >> "$GITHUB_ENV"
        echo "VCPKG_DOWNLOADS=$DOWNLOADS_DIR" >> "$GITHUB_ENV"

    - uses: ./.github/actions/setup-vcpkg-cache
      if: ${{ !contains(vars.RUNNER_LINUX || '', 'self-hosted') }}
      with:
        cache-key-prefix: CodeQL

    - name: Bootstrap vcpkg
      run: bash "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
      env:
        VCPKG_BINARY_SOURCES: "clear;default,readwrite"

    - name: Configure
      uses: lukka/run-cmake@v10
      with:
        configurePreset: config-linux-gcc
      env:
        VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

    - name: Build
      uses: lukka/run-cmake@v10
      with:
        buildPreset: build-linux-gcc
        buildPresetAdditionalArgs: "['--parallel', '8']"
      env:
        VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        upload: false

    - name: filter-sarif
      uses: advanced-security/filter-sarif@v1
      with:
        patterns: |
          -**/*
          src/**/*
        input: '../results/cpp.sarif'
        output: '../results/cpp.sarif'

    - name: Upload SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        category: "/language:${{ matrix.language }}"

    - name: Upload Analysis as a Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sarif-results
        path: sarif-results
        retention-days: 1

  ##
  ## SONARCLOUD JOB
  ##

  CodeScanning_SonarCloud:
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-latest"]') }}
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Clean workspace (self-hosted)
      if: contains(vars.RUNNER_LINUX || '', 'self-hosted')
      run: rm -rf build/

    - uses: ./.github/actions/setup-cpp-toolchain
      if: ${{ !contains(vars.RUNNER_LINUX || '', 'self-hosted') }}
      with:
        compiler: gcc-15

    - name: Install build-wrapper
      uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v6

    - name: Setup vcpkg cache (self-hosted)
      if: contains(vars.RUNNER_LINUX || '', 'self-hosted')
      run: |
        BINARY_DIR="$HOME/.cache/vcpkg/archives"
        DOWNLOADS_DIR="$HOME/.cache/vcpkg/downloads"
        mkdir -p "$BINARY_DIR" "$DOWNLOADS_DIR"
        echo "VCPKG_DEFAULT_BINARY_CACHE=$BINARY_DIR" >> "$GITHUB_ENV"
        echo "VCPKG_DOWNLOADS=$DOWNLOADS_DIR" >> "$GITHUB_ENV"

    - uses: ./.github/actions/setup-vcpkg-cache
      if: ${{ !contains(vars.RUNNER_LINUX || '', 'self-hosted') }}
      with:
        cache-key-prefix: SonarCloud

    - name: Bootstrap vcpkg
      run: bash "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
      env:
        VCPKG_BINARY_SOURCES: "clear;default,readwrite"

    - name: Configure
      uses: lukka/run-cmake@v10
      with:
        configurePreset: config-linux-gcc-coverage
        configurePresetAdditionalArgs: "['-DUSE_SONARQUBE=ON']"
      env:
        VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

    - name: Build with build-wrapper
      run: |
        build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} cmake --build --preset=build-linux-gcc-coverage

    - name: Run SonarCloud scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dproject.settings=${{ github.workspace }}/sonar-project.properties
          -Dsonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
          -Dsonar.coverageReportPaths=${{ github.workspace }}/build/config-linux-gcc-coverage/coverage-testaqualink-automate.xml

  ##
  ## MSVC CODE ANALYSIS JOB
  ##

  CodeScanning_MSVCCodeAnalysis:
    runs-on: ${{ fromJSON(vars.RUNNER_WINDOWS || '["windows-latest"]') }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Clean workspace (self-hosted)
      if: contains(vars.RUNNER_WINDOWS || '', 'self-hosted')
      shell: bash
      run: rm -rf build/

    - uses: ./.github/actions/setup-cpp-toolchain
      if: ${{ !contains(vars.RUNNER_WINDOWS || '', 'self-hosted') }}
      with:
        compiler: msvc

    - name: Setup MSVC environment (self-hosted)
      if: contains(vars.RUNNER_WINDOWS || '', 'self-hosted')
      uses: ilammy/msvc-dev-cmd@v1

    - name: Setup vcpkg cache (self-hosted)
      if: contains(vars.RUNNER_WINDOWS || '', 'self-hosted')
      shell: bash
      run: |
        BINARY_DIR="$HOME/.cache/vcpkg/archives"
        DOWNLOADS_DIR="$HOME/.cache/vcpkg/downloads"
        mkdir -p "$BINARY_DIR" "$DOWNLOADS_DIR"
        # Convert Git bash paths to native Windows paths for CMake/vcpkg
        if command -v cygpath >/dev/null 2>&1; then
          BINARY_DIR=$(cygpath -w "$BINARY_DIR")
          DOWNLOADS_DIR=$(cygpath -w "$DOWNLOADS_DIR")
        fi
        echo "VCPKG_DEFAULT_BINARY_CACHE=$BINARY_DIR" >> "$GITHUB_ENV"
        echo "VCPKG_DOWNLOADS=$DOWNLOADS_DIR" >> "$GITHUB_ENV"

    - uses: ./.github/actions/setup-vcpkg-cache
      if: ${{ !contains(vars.RUNNER_WINDOWS || '', 'self-hosted') }}
      with:
        cache-key-prefix: MSVCAnalysis

    - name: Bootstrap vcpkg
      shell: bash
      run: |
        if [ -f "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.sh" ]; then
          bash "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
        elif [ -f "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.bat" ]; then
          "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
        fi
      env:
        VCPKG_BINARY_SOURCES: "clear;default,readwrite"

    - name: Configure
      uses: lukka/run-cmake@v10
      with:
        configurePreset: config-windows-msvc
      env:
        VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

    - name: Build
      uses: lukka/run-cmake@v10
      with:
        buildPreset: build-windows-msvc
      env:
        VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

    - uses: microsoft/msvc-code-analysis-action@v0.1.1
      id: run-analysis
      with:
        cmakeBuildDirectory: ${{ github.workspace }}/build/config-windows-msvc
        buildConfiguration: Release
        ruleset: NativeRecommendedRules.ruleset
        ignoredPaths: ${{ github.workspace }}/deps;${{ github.workspace }}/src/version;${{ github.workspace }}/test

    - name: Upload SARIF to GitHub
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.run-analysis.outputs.sarif }}

    - name: Upload SARIF as an Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sarif-file
        path: ${{ steps.run-analysis.outputs.sarif }}
