name: Automated Code Scanning

on:
  # Code scanning is SLOW (full per-platform builds), so only scan code where it
  # is genuinely NEW:
  #   * pull_request into develop -> feature work entering the integration branch
  #   * pull_request into main    -> code arriving on the release branch, EXCEPT a
  #       develop->main promotion (skipped per-job below: that code was already
  #       scanned when it entered develop, so re-scanning the promotion is pure
  #       duplication and was the long redundant run we removed)
  #   * schedule -> weekly baseline of the default branch (Security tab)
  #   * workflow_dispatch -> on demand
  # The former `push: [main, feature/**, bug/**]` triggers re-scanned the
  # post-merge main commit and every WIP feature push, all already covered above.
  pull_request:
    branches: [ "develop", "main" ]
  schedule:
    - cron: '42 21 * * 2'
  workflow_dispatch:

concurrency:
  group: code-scanning-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:

  ##
  ## CODEQL JOB
  ##

  CodeScanning_CodeQL:
    # Skip a develop->main promotion PR (already scanned on develop entry); run for
    # everything else (PR into develop, non-develop PR into main, schedule, dispatch).
    # AND: fork PRs must not run on the persistent self-hosted runners (untrusted
    # code on a long-lived host) — gate them out, leaving schedule/dispatch/same-repo.
    if: >-
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      (github.event_name != 'pull_request' ||
       github.head_ref != 'develop' ||
       github.base_ref != 'main')
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-latest"]') }}
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'c-cpp' ]

    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        submodules: recursive

    - name: Clean workspace (self-hosted)
      if: contains(vars.RUNNER_LINUX || '', 'self-hosted')
      run: rm -rf build/

    - uses: ./.github/actions/setup-cpp-toolchain
      if: ${{ !contains(vars.RUNNER_LINUX || '', 'self-hosted') }}
      with:
        compiler: gcc-15

    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
      with:
        languages: ${{ matrix.language }}

    - name: Setup vcpkg cache (self-hosted)
      if: contains(vars.RUNNER_LINUX || '', 'self-hosted')
      run: |
        BINARY_DIR="$HOME/.cache/vcpkg/archives"
        DOWNLOADS_DIR="$HOME/.cache/vcpkg/downloads"
        mkdir -p "$BINARY_DIR" "$DOWNLOADS_DIR"
        echo "VCPKG_DEFAULT_BINARY_CACHE=$BINARY_DIR" >> "$GITHUB_ENV"
        echo "VCPKG_DOWNLOADS=$DOWNLOADS_DIR" >> "$GITHUB_ENV"

    - uses: ./.github/actions/setup-vcpkg-cache
      if: ${{ !contains(vars.RUNNER_LINUX || '', 'self-hosted') }}
      with:
        cache-key-prefix: CodeQL

    - name: Bootstrap vcpkg
      run: bash "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
      env:
        VCPKG_BINARY_SOURCES: "clear;default,readwrite"

    - name: Configure
      uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
      with:
        configurePreset: config-linux-gcc
      env:
        VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

    - name: Build
      uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
      with:
        buildPreset: build-linux-gcc
        buildPresetAdditionalArgs: "['--parallel', '8']"
      env:
        VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
      with:
        upload: false

    - name: filter-sarif
      uses: advanced-security/filter-sarif@2da736ff05ef065cb2894ac6892e47b5eac2c3c0 # v1.1
      with:
        patterns: |
          -**/*
          src/**/*
        input: '../results/cpp.sarif'
        output: '../results/cpp.sarif'

    - name: Upload SARIF
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
      with:
        category: "/language:${{ matrix.language }}"

    - name: Upload Analysis as a Build Artifact
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: sarif-results
        path: sarif-results
        retention-days: 1

  ##
  ## SONARCLOUD JOB
  ##

  CodeScanning_SonarCloud:
    # Skip a develop->main promotion PR (already scanned on develop entry).
    # AND gate out fork PRs from the persistent self-hosted runners (untrusted code
    # on a long-lived host; SonarCloud also needs SONAR_TOKEN, withheld from forks).
    if: >-
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      (github.event_name != 'pull_request' ||
       github.head_ref != 'develop' ||
       github.base_ref != 'main')
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-latest"]') }}
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory

    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Clean workspace (self-hosted)
      if: contains(vars.RUNNER_LINUX || '', 'self-hosted')
      run: rm -rf build/

    - uses: ./.github/actions/setup-cpp-toolchain
      if: ${{ !contains(vars.RUNNER_LINUX || '', 'self-hosted') }}
      with:
        compiler: gcc-15

    - name: Install build-wrapper
      uses: SonarSource/sonarqube-scan-action/install-build-wrapper@713881670b6b3676cda39549040e2d88c70d582e # v8

    - name: Setup vcpkg cache (self-hosted)
      if: contains(vars.RUNNER_LINUX || '', 'self-hosted')
      run: |
        BINARY_DIR="$HOME/.cache/vcpkg/archives"
        DOWNLOADS_DIR="$HOME/.cache/vcpkg/downloads"
        mkdir -p "$BINARY_DIR" "$DOWNLOADS_DIR"
        echo "VCPKG_DEFAULT_BINARY_CACHE=$BINARY_DIR" >> "$GITHUB_ENV"
        echo "VCPKG_DOWNLOADS=$DOWNLOADS_DIR" >> "$GITHUB_ENV"

    - uses: ./.github/actions/setup-vcpkg-cache
      if: ${{ !contains(vars.RUNNER_LINUX || '', 'self-hosted') }}
      with:
        cache-key-prefix: SonarCloud

    - name: Bootstrap vcpkg
      run: bash "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
      env:
        VCPKG_BINARY_SOURCES: "clear;default,readwrite"

    - name: Configure
      uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
      with:
        configurePreset: config-linux-gcc-coverage
        configurePresetAdditionalArgs: "['-DUSE_SONARQUBE=ON']"
      env:
        VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

    - name: Build with build-wrapper
      run: |
        build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} cmake --build --preset=build-linux-gcc-coverage

    - name: Run SonarCloud scan
      uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dproject.settings=${{ github.workspace }}/sonar-project.properties
          -Dsonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
          -Dsonar.coverageReportPaths=${{ github.workspace }}/build/config-linux-gcc-coverage/coverage-testaqualink-automate.xml

  ##
  ## MSVC CODE ANALYSIS JOB
  ##

  CodeScanning_MSVCCodeAnalysis:
    # Skip a develop->main promotion PR (already scanned on develop entry).
    # AND gate out fork PRs from the persistent self-hosted Windows runners
    # (untrusted code on a long-lived host).
    if: >-
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository) &&
      (github.event_name != 'pull_request' ||
       github.head_ref != 'develop' ||
       github.base_ref != 'main')
    runs-on: ${{ fromJSON(vars.RUNNER_WINDOWS || '["windows-latest"]') }}
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      with:
        submodules: recursive

    - name: Clean workspace (self-hosted)
      if: contains(vars.RUNNER_WINDOWS || '', 'self-hosted')
      shell: bash
      run: rm -rf build/

    - uses: ./.github/actions/setup-cpp-toolchain
      if: ${{ !contains(vars.RUNNER_WINDOWS || '', 'self-hosted') }}
      with:
        compiler: msvc

    # Pure-PowerShell local composite (no Node) — replaces ilammy/msvc-dev-cmd,
    # which only ships a deprecated Node 20 runtime.
    - name: Setup MSVC environment (self-hosted)
      if: contains(vars.RUNNER_WINDOWS || '', 'self-hosted')
      uses: ./.github/actions/setup-msvc-env

    - name: Setup vcpkg cache (self-hosted)
      if: contains(vars.RUNNER_WINDOWS || '', 'self-hosted')
      shell: bash
      run: |
        BINARY_DIR="$HOME/.cache/vcpkg/archives"
        DOWNLOADS_DIR="$HOME/.cache/vcpkg/downloads"
        mkdir -p "$BINARY_DIR" "$DOWNLOADS_DIR"
        # Convert Git bash paths to native Windows paths for CMake/vcpkg
        if command -v cygpath >/dev/null 2>&1; then
          BINARY_DIR=$(cygpath -w "$BINARY_DIR")
          DOWNLOADS_DIR=$(cygpath -w "$DOWNLOADS_DIR")
        fi
        echo "VCPKG_DEFAULT_BINARY_CACHE=$BINARY_DIR" >> "$GITHUB_ENV"
        echo "VCPKG_DOWNLOADS=$DOWNLOADS_DIR" >> "$GITHUB_ENV"

    - uses: ./.github/actions/setup-vcpkg-cache
      if: ${{ !contains(vars.RUNNER_WINDOWS || '', 'self-hosted') }}
      with:
        cache-key-prefix: MSVCAnalysis

    - name: Bootstrap vcpkg
      shell: bash
      run: |
        if [ -f "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.sh" ]; then
          bash "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
        elif [ -f "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.bat" ]; then
          "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
        fi
      env:
        VCPKG_BINARY_SOURCES: "clear;default,readwrite"

    - name: Configure
      uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
      with:
        configurePreset: config-windows-msvc
      env:
        VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

    - name: Build
      uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10.9
      with:
        buildPreset: build-windows-msvc
      env:
        VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

    - uses: microsoft/msvc-code-analysis-action@24c285ab36952c9e9182f4b78dfafbac38a7e5ee # v0.1.1
      id: run-analysis
      with:
        cmakeBuildDirectory: ${{ github.workspace }}/build/config-windows-msvc
        buildConfiguration: Release
        ruleset: NativeRecommendedRules.ruleset
        ignoredPaths: ${{ github.workspace }}/deps;${{ github.workspace }}/src/version;${{ github.workspace }}/test

    - name: Upload SARIF to GitHub
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
      with:
        sarif_file: ${{ steps.run-analysis.outputs.sarif }}

    - name: Upload SARIF as an Artifact
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
        name: sarif-file
        path: ${{ steps.run-analysis.outputs.sarif }}
