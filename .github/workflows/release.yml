name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0, v1.0.0-beta.1)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Dry run — build packages but don't create release"
        required: false
        type: boolean
        default: false

# Serialise releases of the same version; never cancel an in-flight release.
concurrency:
  group: release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      version_tag: ${{ steps.resolve.outputs.version_tag }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
      is_dry_run: ${{ steps.resolve.outputs.is_dry_run }}

    steps:
      - name: Resolve version from trigger
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
            IS_DRY_RUN="false"
          else
            TAG="${{ inputs.version }}"
            IS_DRY_RUN="${{ inputs.dry_run }}"
          fi

          # Validate tag format: v<M>.<M>.<P>[-(alpha|beta|rc).<N>]
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            echo "::error::Invalid version format: $TAG (expected v<M>.<M>.<P>[-(alpha|beta|rc).<N>])"
            exit 1
          fi

          # Strip leading 'v' for version string
          VERSION="${TAG#v}"

          # Detect prerelease from tag name or manual input
          if [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "$TAG" =~ -(alpha|beta|rc)\. ]]; then
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi
          else
            IS_PRERELEASE="${{ inputs.prerelease }}"
            # Auto-detect if the tag itself has a prerelease suffix
            if [[ "$TAG" =~ -(alpha|beta|rc)\. ]]; then
              IS_PRERELEASE="true"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "is_dry_run=$IS_DRY_RUN" >> "$GITHUB_OUTPUT"

          echo "### Version Resolution" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | $VERSION |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | $TAG |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pre-release | $IS_PRERELEASE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | $IS_DRY_RUN |" >> "$GITHUB_STEP_SUMMARY"

      # On a manual dispatch the tag does not exist yet (github-release pushes it
      # at the end). Fail fast if it is already present so we don't build every
      # package and only discover the collision at the final push. (A tag-push
      # trigger is exempt: the tag obviously exists — it triggered the run.)
      - name: Guard against an existing tag (dispatch only)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.resolve.outputs.version_tag }}"
          if gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Push it to trigger a release, or choose a new version."
            exit 1
          fi
          echo "Tag ${TAG} is available."

  build-packages:
    name: Package — ${{ matrix.name }}
    needs: [resolve-version]
    runs-on: ${{ fromJSON(matrix.runner) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Linux GCC"
            runner: ${{ vars.RUNNER_LINUX || '["ubuntu-latest"]' }}
            compiler: gcc-15
            configure_preset: config-linux-gcc
            build_preset: build-linux-gcc
            test_preset: test-linux-gcc
            package_preset: pack-linux-gcc
          - name: "Windows MSVC"
            runner: ${{ vars.RUNNER_WINDOWS || '["windows-latest"]' }}
            compiler: msvc
            configure_preset: config-windows-msvc
            build_preset: build-windows-msvc
            test_preset: test-windows-msvc
            package_preset: pack-windows-msvc
          - name: "macOS Clang"
            runner: '["macos-latest"]'
            compiler: llvm
            configure_preset: config-macos-llvm
            build_preset: build-macos-llvm
            test_preset: test-macos-llvm
            package_preset: pack-macos-llvm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Create local tag for dispatch builds
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git tag "${{ needs.resolve-version.outputs.version_tag }}" HEAD

      - name: Clean workspace (self-hosted)
        if: contains(matrix.runner, 'self-hosted')
        shell: bash
        run: rm -rf build/

      - uses: ./.github/actions/setup-cpp-toolchain
        if: ${{ !contains(matrix.runner, 'self-hosted') }}
        with:
          compiler: ${{ matrix.compiler }}

      # Self-hosted Windows images bake in the VS Build Tools but do not expose
      # the MSVC environment (cl.exe, INCLUDE/LIB) on the default PATH; mirror
      # the CI workflow and load it so the Configure step can find the compiler.
      - name: Setup MSVC environment (self-hosted)
        if: contains(matrix.runner, 'self-hosted') && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install NSIS
        if: runner.os == 'Windows' && !contains(matrix.runner, 'self-hosted')
        run: choco install nsis -y

      - name: Setup vcpkg cache (self-hosted)
        if: contains(matrix.runner, 'self-hosted')
        shell: bash
        run: |
          BINARY_DIR="$HOME/.cache/vcpkg/archives"
          DOWNLOADS_DIR="$HOME/.cache/vcpkg/downloads"
          mkdir -p "$BINARY_DIR" "$DOWNLOADS_DIR"
          echo "VCPKG_DEFAULT_BINARY_CACHE=$BINARY_DIR" >> "$GITHUB_ENV"
          echo "VCPKG_DOWNLOADS=$DOWNLOADS_DIR" >> "$GITHUB_ENV"

      - uses: ./.github/actions/setup-vcpkg-cache
        if: ${{ !contains(matrix.runner, 'self-hosted') }}
        with:
          cache-key-prefix: ${{ matrix.name }}

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          if [ -f "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.sh" ]; then
            bash "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          elif [ -f "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.bat" ]; then
            "${{ github.workspace }}/deps/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          fi
        env:
          VCPKG_BINARY_SOURCES: "clear;default,readwrite"

      # VCPKG_ROOT points lukka/run-cmake (and the in-tree vcpkg toolchain) at the
      # project's deps/vcpkg. On self-hosted Windows, vcvarsall (msvc-dev-cmd) leaks
      # VCPKG_ROOT -> the VS-bundled, manifest-less vcpkg; this step-level env value
      # overrides that leak, so no special "pin" step is needed (same as Linux/macOS).
      - name: Configure
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.configure_preset }}
        env:
          VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

      - name: Build
        uses: lukka/run-cmake@v10
        with:
          buildPreset: ${{ matrix.build_preset }}
        env:
          VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

      - name: Test
        uses: lukka/run-cmake@v10
        with:
          testPreset: ${{ matrix.test_preset }}
        env:
          VCPKG_ROOT: ${{ github.workspace }}/deps/vcpkg

      - name: Package
        run: cpack --preset=${{ matrix.package_preset }}

      # Install/extract the freshly built package on a clean target and run the
      # binary. This catches missing runtime dependencies (the exact failure
      # mode of an unbundled dynamic build) BEFORE the package is published.
      - name: Smoke test — install package & run (Linux)
        if: runner.os == 'Linux'
        run: |
          docker run --rm -v "$PWD/packages:/pkg:ro" ubuntu:25.04 bash -c '
            set -e
            apt-get update -qq
            apt-get install -y -qq /pkg/*.deb
            aqualink-automate --version'

      - name: Smoke test — extract ZIP & run (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $zip = Get-ChildItem packages/*.zip | Select-Object -First 1
          if (-not $zip) { throw "No ZIP package was produced" }
          Expand-Archive -Path $zip.FullName -DestinationPath smoke -Force
          $exe = Get-ChildItem -Path smoke -Recurse -Filter aqualink-automate.exe | Select-Object -First 1
          if (-not $exe) { throw "aqualink-automate.exe not found in the package" }
          & $exe.FullName --version
          if ($LASTEXITCODE -ne 0) { throw "Binary exited with code $LASTEXITCODE" }

      - name: Smoke test — extract TGZ & run (macOS)
        if: runner.os == 'macOS'
        run: |
          set -e
          mkdir -p smoke
          tar xzf packages/*.tgz -C smoke
          BIN="$(find smoke -name aqualink-automate -type f -perm +111 | head -1)"
          if [ -z "$BIN" ]; then echo "::error::binary not found in package"; exit 1; fi
          "$BIN" --version

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.configure_preset }}
          if-no-files-found: error
          path: |
            packages/*.deb
            packages/*.rpm
            packages/*.tgz
            packages/*.zip
            packages/*.exe
            packages/*.dmg
            packages/*.sha512
          retention-days: 30

  docker-publish:
    name: Docker Publish
    needs: [resolve-version, build-packages]
    if: needs.resolve-version.outputs.is_dry_run != 'true'
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-latest"]') }}
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=semver,pattern={{version}},value=${{ needs.resolve-version.outputs.version_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve-version.outputs.version_tag }}
            type=raw,value=latest,enable=${{ needs.resolve-version.outputs.is_prerelease != 'true' }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          build-args: |
            VERSION=${{ needs.resolve-version.outputs.version_tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: GitHub Release
    needs: [resolve-version, build-packages, docker-publish]
    if: needs.resolve-version.outputs.is_dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Push tag for dispatch builds
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git tag "${{ needs.resolve-version.outputs.version_tag }}" HEAD && git push origin "${{ needs.resolve-version.outputs.version_tag }}"

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: packages-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ needs.resolve-version.outputs.is_prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ needs.resolve-version.outputs.version_tag }}" \
            --title "${{ needs.resolve-version.outputs.version_tag }}" \
            --generate-notes \
            $PRERELEASE_FLAG \
            release-artifacts/*
