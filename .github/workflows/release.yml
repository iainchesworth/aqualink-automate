name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0, v1.0.0-beta.1)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Dry run — build packages but don't create release"
        required: false
        type: boolean
        default: false

# Serialise releases of the same version; never cancel an in-flight release.
concurrency:
  group: release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      version_tag: ${{ steps.resolve.outputs.version_tag }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
      is_dry_run: ${{ steps.resolve.outputs.is_dry_run }}

    steps:
      # Needed for the "cut from main" guard below (merge-base ancestry check).
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve version from trigger
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF_NAME}"
            IS_DRY_RUN="false"
          else
            TAG="${{ inputs.version }}"
            IS_DRY_RUN="${{ inputs.dry_run }}"
          fi

          # Validate tag format: v<M>.<M>.<P>[-(alpha|beta|rc).<N>]
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]]; then
            echo "::error::Invalid version format: $TAG (expected v<M>.<M>.<P>[-(alpha|beta|rc).<N>])"
            exit 1
          fi

          # Strip leading 'v' for version string
          VERSION="${TAG#v}"

          # Detect prerelease from tag name or manual input
          if [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "$TAG" =~ -(alpha|beta|rc)\. ]]; then
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi
          else
            IS_PRERELEASE="${{ inputs.prerelease }}"
            # Auto-detect if the tag itself has a prerelease suffix
            if [[ "$TAG" =~ -(alpha|beta|rc)\. ]]; then
              IS_PRERELEASE="true"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "is_dry_run=$IS_DRY_RUN" >> "$GITHUB_OUTPUT"

          echo "### Version Resolution" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | $VERSION |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | $TAG |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pre-release | $IS_PRERELEASE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry run | $IS_DRY_RUN |" >> "$GITHUB_STEP_SUMMARY"

      # On a manual dispatch the tag does not exist yet (github-release pushes it
      # at the end). Fail fast if it is already present so we don't build every
      # package and only discover the collision at the final push. (A tag-push
      # trigger is exempt: the tag obviously exists — it triggered the run.)
      - name: Guard against an existing tag (dispatch only)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.resolve.outputs.version_tag }}"
          if gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Push it to trigger a release, or choose a new version."
            exit 1
          fi
          echo "Tag ${TAG} is available."

      # Real releases must be cut from main: develop is the integration branch,
      # only main holds released code. The release commit must be contained in
      # origin/main (works for both a v* tag push and a workflow_dispatch).
      # Dry-runs are EXEMPT so the pipeline can be validated from any branch
      # (e.g. develop) without merging to main first.
      - name: Enforce releases are cut from main
        if: steps.resolve.outputs.is_dry_run != 'true'
        shell: bash
        run: |
          git fetch --no-tags origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release commit $GITHUB_SHA is contained in main — OK."
          else
            echo "::error::Release commit $GITHUB_SHA is not on main. Cut releases from main (merge develop -> main, then tag main)."
            exit 1
          fi

  # Build + test + package on every platform via the same reusable workflow CI
  # uses, so the suites can never diverge between CI and release. do_package adds
  # cpack + the per-OS install/extract smoke test + the package artifact upload.
  build-packages:
    name: Package
    needs: [resolve-version]
    uses: ./.github/workflows/_build.yml
    with:
      do_package: true
      version_tag: ${{ needs.resolve-version.outputs.version_tag }}
      fetch_depth: 0
      # Publish the relocatable Linux install tree so docker-publish assembles the
      # runtime image from it instead of recompiling vcpkg from scratch.
      upload_installtree: true

  docker-publish:
    name: Docker Publish
    needs: [resolve-version, build-packages]
    if: needs.resolve-version.outputs.is_dry_run != 'true'
    runs-on: ${{ fromJSON(vars.RUNNER_LINUX || '["ubuntu-latest"]') }}
    permissions:
      packages: write
    # Surfaced so the "Login to Docker Hub" step's `if:` can gate on the optional
    # secret being present (the `secrets` context is not usable in step-level
    # `if`). Only the username is exposed; the token is referenced directly in the
    # step's `with:`.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v4

      # The Dockerfile's base images (ubuntu:25.04, node:22-bookworm-slim) are
      # pulled from Docker Hub. Anonymous pulls share the runner's egress IP and
      # hit the strict anonymous rate limit (acute on self-hosted runners) — the
      # recurring reliability risk. Authenticating raises the pull quota. Gated on
      # the optional DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets so forks and
      # credential-less runs still build anonymously. See docs/releasing.md.
      - name: Login to Docker Hub
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=semver,pattern={{version}},value=${{ needs.resolve-version.outputs.version_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve-version.outputs.version_tag }}
            type=raw,value=latest,enable=${{ needs.resolve-version.outputs.is_prerelease != 'true' }}
            type=raw,value=edge,enable=${{ needs.resolve-version.outputs.is_prerelease == 'true' }}

      # Stage the prebuilt Linux install tree (built + version-stamped by
      # build-packages on the Ubuntu-25.04 runner) into the build context so the
      # runtime-assembled stage copies it straight in — NO vcpkg/source recompile.
      - name: Download Linux install tree
        uses: actions/download-artifact@v4
        with:
          name: installtree-linux-gcc
          path: docker/context

      - name: Verify staged install tree
        run: |
          TARBALL=docker/context/installtree-linux-gcc.tar.gz
          if [ ! -f "$TARBALL" ]; then
            echo "::error::Staged install-tree tarball missing ($TARBALL) — cannot assemble the image."
            exit 1
          fi
          tar tzf "$TARBALL" ./bin/aqualink-automate >/dev/null \
            || { echo "::error::install-tree tarball does not contain ./bin/aqualink-automate"; exit 1; }
          echo "Staged install tree OK ($(du -h "$TARBALL" | cut -f1))."

      # Assemble + push via buildx, wrapped in a bounded retry so a transient Docker
      # Hub CDN blob timeout pulling a base image doesn't fail the release. The image
      # is assembled from the prebuilt install tree (no C++ recompile); only the
      # matter sidecar's TypeScript builds (matter-builder stage). The binary is
      # already version-stamped, so no VERSION build-arg is needed. The "pull & run"
      # smoke test below is the ABI guard (a glibc/libstdc++ mismatch would fail
      # --version); CI's from-source docker-verify is the cold-build gate.
      - name: Build and push runtime image (assembled)
        uses: nick-fields/retry@v4
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_LABELS: ${{ steps.meta.outputs.labels }}
        with:
          shell: bash
          timeout_minutes: 60
          max_attempts: 3
          retry_wait_seconds: 30
          retry_on: error
          command: |
            cmd=(docker buildx build --target runtime-assembled --push)
            while IFS= read -r tag;   do [ -n "$tag" ]   && cmd+=(--tag   "$tag");   done <<< "${IMAGE_TAGS}"
            while IFS= read -r label; do [ -n "$label" ] && cmd+=(--label "$label"); done <<< "${IMAGE_LABELS}"
            cmd+=(.)
            printf 'Running:'; printf ' %q' "${cmd[@]}"; echo
            "${cmd[@]}"

      # Verify the image we just published is actually pullable from GHCR and
      # runs. `buildx build --push` pushes straight to the registry without loading
      # the image locally, so `docker pull` here genuinely exercises the published
      # artifact (not a local build cache). Assert it reports the resolved version.
      - name: Smoke test — pull & run the published image
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository }}:${{ needs.resolve-version.outputs.version }}"
          echo "Pulling published image: $IMAGE"
          docker pull "$IMAGE"
          echo "Running --version on the pulled image:"
          OUTPUT="$(docker run --rm "$IMAGE" --version)"
          echo "$OUTPUT"
          if ! echo "$OUTPUT" | grep -qF "${{ needs.resolve-version.outputs.version }}"; then
            echo "::error::Published image did not report version ${{ needs.resolve-version.outputs.version }}"
            exit 1
          fi
          echo "Published Docker image verified: pullable, runs, and reports ${{ needs.resolve-version.outputs.version }}."

  github-release:
    name: GitHub Release
    needs: [resolve-version, build-packages, docker-publish]
    if: needs.resolve-version.outputs.is_dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Push tag for dispatch builds
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git tag "${{ needs.resolve-version.outputs.version_tag }}" HEAD && git push origin "${{ needs.resolve-version.outputs.version_tag }}"

      # actions/download-artifact has no Node 24 release yet, so it stays on v4
      # (bumping would not clear the Node 20 warning and risks breaking changes).
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: packages-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ needs.resolve-version.outputs.is_prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ needs.resolve-version.outputs.version_tag }}" \
            --title "${{ needs.resolve-version.outputs.version_tag }}" \
            --generate-notes \
            $PRERELEASE_FLAG \
            release-artifacts/*

  # If a real PRERELEASE run did not complete, delete its orphaned tag so a re-tag
  # can retry cleanly (automates the by-hand beta.2/beta.3 cleanup). Never touches a
  # stable tag, a dry-run, or a tag that already has a published release.
  cleanup-failed-prerelease:
    name: Clean up orphaned prerelease tag
    needs: [resolve-version, build-packages, docker-publish, github-release]
    if: >-
      always() &&
      needs.resolve-version.result == 'success' &&
      needs.resolve-version.outputs.is_dry_run != 'true' &&
      needs.resolve-version.outputs.is_prerelease == 'true' &&
      (needs.build-packages.result == 'failure' ||
       needs.docker-publish.result == 'failure' ||
       needs.github-release.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete the orphaned prerelease tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.resolve-version.outputs.version_tag }}"
          if gh release view "$TAG" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "A published release exists for $TAG — leaving the tag in place."
            exit 0
          fi
          if gh api "repos/${{ github.repository }}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "Release did not complete; deleting orphaned prerelease tag $TAG"
            gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/${TAG}"
            echo "Deleted $TAG"
          else
            echo "Tag $TAG not present (a dispatch that failed before pushing it) — nothing to delete."
          fi
