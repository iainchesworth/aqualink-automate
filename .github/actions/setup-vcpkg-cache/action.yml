name: Setup vcpkg cache
description: Configure vcpkg binary and download caching with proper cache keys

inputs:
  cache-key-prefix:
    # Retained for backward compatibility with existing callers only. The vcpkg
    # BINARY cache is now keyed by runner OS, NOT by this per-job prefix, so jobs
    # that share a triplet (build-and-test + CodeQL + SonarCloud all use the same
    # x64-linux-gcc triplet) share one cache instead of four disjoint copies.
    description: "Deprecated/ignored: the binary cache is keyed by runner OS."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Get vcpkg version hash
      id: vcpkg-version
      shell: bash
      run: echo "hash=$(git -C "${{ github.workspace }}/deps/vcpkg" rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Set up vcpkg cache directories
      shell: bash
      run: |
        BINARY_DIR="$HOME/.cache/vcpkg/archives"
        DOWNLOADS_DIR="$HOME/.cache/vcpkg/downloads"
        mkdir -p "$BINARY_DIR" "$DOWNLOADS_DIR"
        echo "VCPKG_DEFAULT_BINARY_CACHE=$BINARY_DIR" >> "$GITHUB_ENV"
        echo "VCPKG_DOWNLOADS=$DOWNLOADS_DIR" >> "$GITHUB_ENV"

    - name: Cache vcpkg downloads
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/vcpkg/downloads
        key: vcpkg-downloads-${{ steps.vcpkg-version.outputs.hash }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          vcpkg-downloads-${{ steps.vcpkg-version.outputs.hash }}-
          vcpkg-downloads-

    # Keyed by runner OS + arch (which maps 1:1 to the vcpkg triplet in use here),
    # NOT by the per-job prefix. This collapses the previously disjoint "Linux GCC"
    # / "CodeQL" / "SonarCloud" / "MSVCAnalysis" caches (all x64-linux-gcc) into one
    # shared cache. The arch component keeps the x64 and arm64 Linux jobs (both
    # runner.os == Linux) from racing on a single shared cache entry — they build
    # disjoint archives and each gets its own cache. vcpkg names archives by ABI
    # hash, so multiple triplets would coexist safely in a single cache dir anyway.
    - name: Cache vcpkg binaries
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/vcpkg/archives
        key: vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ steps.vcpkg-version.outputs.hash }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'cmake/vcpkg/triplets/**', 'cmake/vcpkg/overlays/**') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-${{ runner.arch }}-${{ steps.vcpkg-version.outputs.hash }}-
          vcpkg-${{ runner.os }}-${{ runner.arch }}-

    - name: Run vcpkg
      uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
      with:
        vcpkgDirectory: ${{ github.workspace }}/deps/vcpkg
        doNotCache: true
      env:
        VCPKG_BINARY_SOURCES: "clear;default,readwrite"
