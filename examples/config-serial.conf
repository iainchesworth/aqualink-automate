# Aqualink Automate — Serial Connection
#
# Physical RS-485 serial port connected to Aqualink RS controller.
# Copy this file and adjust for your environment.
#
# Usage: aqualink-automate --config config-serial.conf

# Serial
serial-port = /dev/ttyUSB0
baudrate = 9600

# Jandy device emulation
jandy-device-type = onetouch
jandy-device-id = 0x41

# Web interface
address = 0.0.0.0
disable-https = true

# MQTT
mqtt = true
mqtt-host = 192.168.1.100
mqtt-port = 1883

# Home Assistant
home-assistant = true
ha-discovery-prefix = homeassistant
