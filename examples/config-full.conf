# Aqualink Automate — Complete configuration reference
# =============================================================================
# This file lists EVERY supported option, grouped by subsystem, each shown with
# its DEFAULT value and a one-line explanation. It is a reference template:
# copy it, uncomment the lines you need, edit the values, and run:
#
#     aqualink-automate --config config.conf
#
# As shipped, every line is commented out, so this file behaves exactly like
# running with no config at all (all defaults). Uncomment only what you change.
#
# -----------------------------------------------------------------------------
# FORMAT (flat INI)
# -----------------------------------------------------------------------------
#   * One `key = value` per line. No [sections]. Whitespace is trimmed.
#   * Keys are the CLI long-option name WITHOUT the leading `--`
#       --mqtt-host 192.168.1.100   ->   mqtt-host = 192.168.1.100
#   * Lines beginning with `#` are comments; blank lines are ignored.
#   * The COMMAND LINE WINS: args are parsed first and the config is merged
#     second (first-write-wins), so a value set on the CLI is never overridden.
#   * Flags are truthy/falsy: `true`, `yes`, `on`, `1` (case-insensitive) ENABLE
#     a flag; anything else (including `false`, `no`, `0`, empty) leaves it at
#     its default. Note this means an ON-by-default flag generally cannot be
#     turned off via this rule — where an off-switch exists it is called out
#     below (e.g. rfc2217 -> no-rfc2217; matter is value-bearing -> matter = false).
#   * An unknown KEY only logs a warning (a typo silently has no effect — check
#     the log). An unknown command-line ARGUMENT is fatal.
#   * `--config`, `--help`, `--version`, `--version-detail` are command-line only
#     and are intentionally not listed below.
#
# -----------------------------------------------------------------------------
# QUICK START — a typical home install only needs a handful of these:
# -----------------------------------------------------------------------------
#   1. ONE serial source: either `serial-port` (physical) OR `remote-serial-port`
#      (network bridge) — they are mutually exclusive.
#   2. `jandy-device-type` / `jandy-device-id` if you want specific emulation
#      (the defaults are fine for most setups).
#   3. `address = 0.0.0.0` to reach the web UI from other machines on your LAN,
#      and `disable-https = true` to serve plain HTTP (see the SECURITY notes).
#
# Task-specific ready-to-run starting points also ship alongside this file:
#   examples/config-serial.conf   — physical RS-485 on the host
#   examples/config-network.conf  — remote serial over RFC2217
#   examples/config-docker.conf   — running in Docker (Matter + host networking)
# Full prose reference, conflicts, and worked examples: docs/configuration.md
# =============================================================================


# =============================================================================
# APPLICATION  (logging)
# =============================================================================
# Debug-level logging. Conflicts with `trace`.
#debug = true
# Trace-level logging (more verbose than debug). Conflicts with `debug`.
#trace = true


# =============================================================================
# SERIAL & CONNECTIVITY
# Pick EITHER a physical port OR a remote port — `serial-port` and
# `remote-serial-port` are mutually exclusive.
# =============================================================================

# --- Physical RS-485 serial port on this host -------------------------------
# Default: /dev/ttyS0 (Linux/macOS), COM1 (Windows). Set explicitly in containers.
#serial-port = /dev/ttyUSB0
# Serial baud rate. Standard Aqualink hardware is fixed at 9600 8N1; this exists
# for completeness.
#baudrate = 9600

# --- OR a remote serial port over a serial-to-Ethernet bridge (host:port) ---
# Any non-empty value switches the app to the network transport.
#remote-serial-port = 192.168.1.50:8899
# Use the RFC2217 transport on the remote port (ON by default for remote ports).
#rfc2217 = true
# Disable RFC2217 and use a plain socket instead. This is the off-switch for
# rfc2217. Conflicts with `rfc2217` and `rawtcp`.
#no-rfc2217 = true
# Use raw TCP for the remote port. Conflicts with `rfc2217` and `no-rfc2217`.
#rawtcp = true


# =============================================================================
# WEB SERVER & SECURITY  (HTTP/HTTPS UI + REST/WebSocket API)
# =============================================================================
# Interface to bind. Defaults to loopback only (127.0.0.1) so a fresh install is
# NOT exposed to the network. Set 0.0.0.0 deliberately for LAN access.
#address = 127.0.0.1
# HTTP listen port.
#http-port = 80
# HTTPS listen port.
#https-port = 443
# Serve the REST/WebSocket APIs only; do not serve the rendered web UI content.
#disable-content = true
# Disable the HTTP server entirely. Conflicts with `http-port`.
#disable-http = true
# Disable the HTTPS server entirely. Conflicts with `https-port`, `cert`,
# `cert-key`, `cachain-cert`.
#disable-https = true
# TLS certificate / private key (PEM). Default to exe-relative ssl/cert.pem and
# ssl/key.pem. `cert` and `cert-key` are mutually required: set both or neither.
# No key is shipped: if none exists at the default path, a UNIQUE self-signed
# cert + key is generated on first boot (key written 0600, fingerprint logged).
# Supply your own (CA-issued, at a persistent writable path) for production.
#cert = /etc/aqualink/ssl/cert.pem
#cert-key = /etc/aqualink/ssl/key.pem
# Optional CA chain certificate (PEM).
#cachain-cert = /etc/aqualink/ssl/chain.pem
# Directory the web UI is served from. Defaults to the bundled assets next to the
# executable; usually leave unset.
#doc-root = /opt/aqualink-automate/share/aqualink-automate/web
# Require a bearer token on every API request and the WebSocket upgrade. Unset =
# no authentication (the default). The /api/health liveness probe stays exempt.
# SECURITY: a token over plain HTTP travels in cleartext — pair it with HTTPS.
# Use a long, random value (32+ chars); a token under 16 chars warns at startup.
# Prefer setting it here (file readable only by the service user) over the command
# line, where it is visible in the process table and shell history.
#api-auth-token = change-me-to-a-long-random-secret

# Cross-site protections (off by default). Repeat api-allowed-origin per origin;
# when set, an API request / WebSocket upgrade with a non-listed Origin gets 403.
#api-allowed-origin = https://pool.example.lan
#api-require-csrf-header = true

# Acknowledge an intentionally unauthenticated API on a non-loopback bind (e.g.
# behind a trusted reverse proxy). Downgrades the open-control-plane startup
# warning to an informational note. Do NOT set this on a directly-exposed host.
#insecure-no-auth = true


# =============================================================================
# MQTT & HOME ASSISTANT
# Full topic/entity reference: docs/mqtt-home-assistant.md
# =============================================================================
# Enable the MQTT client.
#mqtt = true
# Broker hostname or IP. Inside Docker use the broker's host IP, not "localhost".
#mqtt-host = localhost
# Broker port. Auto-switches to 8883 when `mqtt-tls` is on and you do not set it.
#mqtt-port = 1883
# Enable TLS for the broker connection.
#mqtt-tls = true
# TLS CA certificate path.
#mqtt-ca-cert = /etc/aqualink/mqtt/ca.pem
# TLS client certificate / key. Mutually required: set both or neither.
#mqtt-client-cert = /etc/aqualink/mqtt/client.pem
#mqtt-client-key = /etc/aqualink/mqtt/client.key
# Skip TLS certificate verification. NOT for production — it defeats TLS.
#mqtt-tls-skip-verify = true
# MQTT client identifier. Unset = auto-generated.
#mqtt-client-id = aqualink-automate
# Broker credentials. SECURITY: sent in cleartext without `mqtt-tls`.
#mqtt-username = pool
#mqtt-password = secret
# Base topic prefix for everything published.
#mqtt-prefix = aqualink
# Periodic status publish interval (seconds).
#mqtt-status-interval = 5
# Periodic statistics publish interval (seconds).
#mqtt-stats-interval = 10
# Publish immediately on data change (in addition to the periodic interval).
# ON by default.
#mqtt-on-change = true
# Enable Home Assistant MQTT discovery. Requires `mqtt`.
#home-assistant = true
# Home Assistant discovery topic prefix.
#ha-discovery-prefix = homeassistant
# Device identifier for HA discovery. Unset = derived from the prefix.
# Requires `home-assistant`.
#ha-device-id = aqualink_pool


# =============================================================================
# ALERTING  (fault detection + webhook notifications)
# =============================================================================
# Salt PPM threshold for the salt-low alert. 0 disables the check. Range 0–6000.
#alert-salt-low-ppm = 2600
# Webhook URL POSTed on every alert transition. Must be an absolute http(s) URL.
#alert-webhook-url = https://example.com/hooks/aqualink
# Seconds without a decoded message before the serial-comms-loss alert raises.
# Must be greater than 0.
#alert-comms-timeout-seconds = 60


# =============================================================================
# HISTORY  (time-series persistence for trends)
# =============================================================================
# SQLite database path. Empty (the default) disables history; the read API then
# returns 503. Set a path to enable recording.
#history-db = /var/lib/aqualink/history.db
# Days of samples to keep before the daily purge. Must be greater than 0.
#history-retention-days = 90
# Interval at which buffered samples flush to disk (seconds). Must be > 0.
#history-flush-seconds = 10


# =============================================================================
# EQUIPMENT  (pool topology + discovered-equipment cache)
# =============================================================================
# Installation type. One of: pool-only, spa-only, combo, dual, auto.
#   pool-only / spa-only = single body; combo = dual body shared equipment;
#   dual = dual body separate equipment; auto = autodetect from the bus (default).
#pool-configuration = auto
# JSON cache of discovered equipment for an instant dashboard on restart.
# Empty (the default) disables caching.
#equipment-cache-file = /var/lib/aqualink/equipment.json


# =============================================================================
# SCHEDULING & PREFERENCES
# =============================================================================
# JSON file persisting schedules. Empty disables the scheduler; its CRUD routes
# then return 503.
#schedules-file = /var/lib/aqualink/schedules.json
# JSON file persisting user/admin preferences. Empty keeps preferences in memory
# only (they reset on restart; the preferences API still works for the session).
#preferences-file = /var/lib/aqualink/preferences.json


# =============================================================================
# MATTER  (smart-home bridge sidecar)
# Pairing + Docker host-networking requirement: docs/MATTER.md
# =============================================================================
# The Matter bridge is ON by default. It is an OPT-OUT, value-bearing flag:
# set it to false to disable the sidecar (the app still runs).
#matter = false
# Directory the sidecar persists fabric/commissioning state to.
#matter-storage-path = /data/matter
# Port the sidecar's status/QR server listens on.
#matter-status-port = 8099
# Commissioning passcode (8 digits). 0 = the sidecar generates and persists one.
#matter-passcode = 0
# Commissioning discriminator (0–4095). 0 = the sidecar generates and persists one.
#matter-discriminator = 0


# =============================================================================
# JANDY EMULATION  (which Jandy/Zodiac devices the app emulates on the bus)
# =============================================================================
# Disable Jandy controller emulation entirely. Conflicts with `jandy-device-type`
# and `jandy-device-id`.
#jandy-disable-emulation = true
# Disable RSSA presence-gating (do not auto-suppress an emulated Serial Adapter
# when a real one is suspected on the bus).
#jandy-disable-presence-gating = true
# Auto-detect the controller from the bus and choose what to emulate
# (overrides `jandy-device-type`).
#jandy-auto-startup = true
# Emulation type. Accepted: rs_keypad, onetouch, iaq, pda, serialadapter,
# spasideremote, unknown (case-insensitive). When unset the app emulates THREE
# by default: onetouch iaq serialadapter.
# NOTE: in a config file this key takes a SINGLE value — the parser reads the rest
# of the line as one token, so a space-separated list here fails to start. To
# emulate MULTIPLE types, pass them space-separated on the COMMAND LINE instead:
#     --jandy-device-type onetouch iaq serialadapter
#jandy-device-type = onetouch
# Hex device ID (0xNN) for the type above. Requires `jandy-device-type`. Same
# single-value-in-config / multiple-on-the-command-line rule as jandy-device-type.
# Per-type defaults when omitted:
#   onetouch=0x41  iaq=0xA1  rs_keypad=0x09  pda=0x61  serialadapter=0x48
#jandy-device-id = 0x41
# 4-digit password for navigating password-protected Jandy menus.
#jandy-nav-password = 1234


# =============================================================================
# PENTAIR
# Pentair protocol support is auto-detected from the wire — there is nothing to
# configure here (the area registers no options).
# =============================================================================


# =============================================================================
# DEVELOPER & REPLAY  (diagnostics, capture recording, deterministic replay)
# Full workflow: docs/RECORD_REPLAY.md
# =============================================================================
# Enable developer mode. Required to gate `replay-filename`.
#dev-mode = true
# Replay file to source test data from. REQUIRES dev-mode, profiler, AND every
# loglevel-<channel> below (all 18); it also conflicts with record-serial.
#replay-filename = test/fixtures/sample_session.cap
# Record serial port data to a file for later replay. Conflicts with replay-filename.
#record-serial = /var/lib/aqualink/capture.cap
# Decode and log RS-485 frames addressed to the master (0x00); observe-only.
#decode-to-master = true
# Capture-replay inter-frame period (milliseconds). 0 = unpaced (as fast as possible).
#replay-frame-period = 15
# Replay speed factor scaling replay-frame-period (>1 faster, <1 slower).
#replay-speed = 1.0
# Profiling tool. One of: tracy, uprof, vtune.
#profiler = tracy

# Per-channel log level. One key per channel; severity is one of:
#   Trace, Debug, Info, Notify, Warning, Error, Fatal (case-insensitive).
# (All 18 are required together only when using replay-filename.)
#loglevel-certificates = info
#loglevel-coroutines = info
#loglevel-developer = info
#loglevel-devices = info
#loglevel-equipment = info
#loglevel-exceptions = info
#loglevel-main = info
#loglevel-messages = info
#loglevel-mqtt = info
#loglevel-navigation = info
#loglevel-options = info
#loglevel-platform = info
#loglevel-profiling = info
#loglevel-protocol = info
#loglevel-scraping = info
#loglevel-serial = info
#loglevel-signals = info
#loglevel-web = info
