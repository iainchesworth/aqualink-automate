# Aqualink Automate — Docker Deployment
#
# Configuration file for running inside a Docker container.
# Copy this file to your project root and adjust for your environment.
#
# Usage with docker-compose:
#   1. Copy this file:  cp examples/config-docker.conf ./config.conf
#   2. Edit config.conf for your setup
#   3. Uncomment the volumes/command lines in docker-compose.yml
#   4. docker compose up
#
# Usage with docker run:
#   docker run -p 80:80 \
#     -v ./config.conf:/etc/aqualink/config.conf:ro \
#     --device /dev/ttyUSB0 \
#     aqualink-automate --config /etc/aqualink/config.conf
#
# MATTER (smart-home) BRIDGE — HOST NETWORKING REQUIRED
#   The image bundles a Matter bridge sidecar (on by default). Matter commissions
#   over IPv6 mDNS (UDP 5540 + 5353), which Docker's bridge driver does NOT forward,
#   so you must run with HOST networking for pairing to work:
#       docker run --network host \
#         -v aqualink-matter:/data/matter \
#         aqualink-automate
#   (docker-compose.yml already sets network_mode: host + a matter-data volume.)
#   The fabric volume (/data/matter) makes pairing survive restarts. To run WITHOUT
#   Matter (e.g. on Docker Desktop where host networking is limited), set the env var
#   MATTER_ENABLED=false (or pass --matter false below) and use normal port mapping.
#
# HEALTH CHECK
#   The image ships a Docker HEALTHCHECK that polls the unauthenticated liveness
#   endpoint GET /api/health, so `docker run` / `docker compose up` report container
#   health automatically -- no extra flags needed. Inspect it with:
#       docker inspect --format '{{.State.Health.Status}}' <container>
#   docker-compose.yml also spells the check out explicitly so it is easy to tune.
#   If you change the web port below (or serve HTTPS only), update the probe URL to
#   match -- in compose via the healthcheck: block, or for `docker run` with
#   --health-cmd "curl -f http://127.0.0.1:<port>/api/health".

# Web interface
# These replace the default CMD arguments when using --config.
address = 0.0.0.0
# doc-root is intentionally NOT set: it defaults to a path resolved relative to
# the executable (share/aqualink-automate/web), which is correct in the image.
# A relative value here would resolve against the container WORKDIR and 404.
disable-https = true

# Serial — uncomment ONE of the following sections:

# Physical RS-485 (requires --device /dev/ttyUSB0 in docker run / devices: in compose)
# serial-port = /dev/ttyUSB0
# baudrate = 9600

# Remote serial via network adapter (no device passthrough needed)
# remote-serial-port = 192.168.1.50:8899
# rfc2217 = true

# Jandy device emulation
jandy-device-type = onetouch
jandy-device-id = 0x41

# MQTT (use container name or host IP — not "localhost" inside Docker)
# mqtt = true
# mqtt-host = 192.168.1.100
# mqtt-port = 1883

# Home Assistant
# home-assistant = true
# ha-discovery-prefix = homeassistant

# Matter bridge (on by default; opt out here or with MATTER_ENABLED=false).
# Requires host networking in Docker (see the note at the top of this file).
# matter = false
# matter-storage-path = /data/matter
