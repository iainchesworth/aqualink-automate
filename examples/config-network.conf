# Aqualink Automate — Network Connection
#
# Remote serial port via serial-to-ethernet adapter (e.g. USR-TCP232).
# Copy this file and adjust for your environment.
#
# Usage: aqualink-automate --config config-network.conf

# Remote serial (host:port)
remote-serial-port = 192.168.1.50:8899
rfc2217 = true

# Jandy device emulation
jandy-device-type = onetouch
jandy-device-id = 0x41

# Web interface
address = 0.0.0.0
disable-https = true

# MQTT
mqtt = true
mqtt-host = 192.168.1.100
mqtt-port = 1883

# Home Assistant
home-assistant = true
ha-discovery-prefix = homeassistant
