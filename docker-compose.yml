services:
  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    # HOST NETWORKING IS REQUIRED FOR MATTER.
    # The bundled Matter bridge commissions over IPv6 mDNS (UDP 5540 + 5353).
    # Docker's bridge driver does not forward link-local IPv6 multicast, so
    # pairing fails under port-mapped bridge networking. Host networking exposes
    # the app's HTTP API (port 80) AND the Matter discovery traffic directly on
    # the host. Linux only -- on Docker Desktop (macOS/Windows) host networking is
    # limited and Matter cannot be commissioned from the LAN; opt out there with
    # MATTER_ENABLED=false (and re-add a `ports: ["80:80"]` mapping if needed).
    network_mode: host
    environment:
      # Set MATTER_ENABLED=false to disable the Matter bridge sidecar (the app
      # still runs; this mirrors --matter false).
      - MATTER_ENABLED=true
      - MATTER_STORAGE_PATH=/data/matter
    # Liveness health check. The image already bakes in an identical HEALTHCHECK,
    # so this block is optional -- it is spelled out here so it is visible and easy
    # to tune. It probes the unauthenticated GET /api/health liveness endpoint, so
    # it keeps working even if you set --api-auth-token. `restart: unless-stopped`
    # (above) then restarts the container if it is reported unhealthy.
    #   - If you change the app's --http-port, update the URL below to match.
    #   - If you serve HTTPS only, switch to `https://localhost:<port>/api/health`
    #     and add `--insecure` for a self-signed certificate.
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--max-time", "4", "http://127.0.0.1:80/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      # Persist Matter fabric/commissioning state so pairing survives restarts.
      - matter-data:/data/matter
      #
      # To use a configuration file instead of CLI arguments, uncomment the
      # following line and copy examples/config-docker.conf to ./config.conf,
      # then add `command: ["--config", "/etc/aqualink/config.conf"]` below:
      #
      # - ./config.conf:/etc/aqualink/config.conf:ro
    #
    # For a physical RS-485 serial port, also pass the device:
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0

  swagger-ui:
    image: swaggerapi/swagger-ui
    profiles: ["docs"]
    ports:
      - "8080:8080"
    volumes:
      - ./assets/web/api/swagger.yaml:/usr/share/nginx/html/swagger.yaml:ro
    environment:
      URL: /swagger.yaml

volumes:
  matter-data:
